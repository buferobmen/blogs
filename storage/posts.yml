- id: 3
  title: рибки
  body: "сь «живий» текст для твого виступу. Це не просто опис слайдів, а промова,
    яку легко виголосити. Рівень мови — Б1 (середній): речення зрозумілі, але звучать
    професійно та природно.\r\n\r\nСлайд 1: Вступ\r\n«Привіт усім! Сьогодні я хочу
    поговорити з вами про тему, яка стосується кожного. Ми живемо у світі, де технології
    стали нашою \"невидимою рукою\". Вони всюди, хоча ми часто їх не помічаємо. Сьогодні
    ми розберемося, як саме алгоритми та цифрові системи змінюють наш побут, роботу
    та навіть здоров’я.»\r\n\r\nСлайд 2: Цифрове мереживо життя\r\n«Погляньте на цей
    слайд. Наше життя сьогодні нагадує цифрове мереживо. З чого починається ваш ранок?
    Мабуть, із розумного будильника або перевірки новин на смартфоні. Ми звикли працювати
    в хмарі, вчитися онлайн і платити за каву телефоном. Технології стали частиною
    нашої рутини, і це робить життя значно швидшим.»\r\n\r\nСлайд 3: Можливості (Глобальний
    зв'язок)\r\n«Що ж нам дають ці зміни? По-перше — це свобода. Ми можемо розмовляти
    з близькими, навіть якщо вони на іншому краї світу. По-друге — це знання. Будь-яка
    інформація тепер доступна за один клік. Ми можемо вивчити нову мову або знайти
    відповідь на будь-яке питання просто зараз.»"
